# SafeRoute-RAG 语料清单 (Corpus Manifest)
#
# 【这个文件是干什么的？】
# manifest.yaml 是 Demo 知识库的「目录 + 测试规格书」，不参与向量检索本身。
# 代码在 ingest 时读取它，用来：
#   1. 知道哪些文件该入库、是否合成机密、原始来源 URL
#   2. 给 ChromaDB chunk 打上 synthetic / source_url / doc_id 元数据
#   3. 提供路由回归测试用的 SAFE/UNSAFE 标准问句（demo_questions）
#   4. 记录 public 文档是否已下载（status），避免漏文件
#
# 【编写规矩】
#   - path：相对 sample_docs/ 的路径，必须与实际文件一致
#   - doc_id：稳定短 ID，问答里的 expected_docs 引用它（不要用文件名硬编码）
#   - synthetic: true → 机密合成 Demo；false → 官方公开资料
#   - status: ready | pending_download | extracted
#   - public 语料流程: legacy/*.pdf → scripts/extract_public_corpus.py → public/*.md → ingest
#   - 问答只写在 demo_questions，不要当知识库文档 ingest
#   - 修改 manifest 后重新 ingest 即可；不必改代码

version: "1.0"
locale: ja
theme: "日本の宇宙・航空・防衛産業"

