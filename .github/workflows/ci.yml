name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Python quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  deploy-hf-space:
    name: Deploy to Hugging Face Space
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN}" ]; then
            echo "::error::Missing GitHub secret HF_TOKEN (Hugging Face write token)."
            exit 1
          fi
          if [ -z "${HF_SPACE}" ]; then
            echo "::error::Missing GitHub variable HF_SPACE (format: username/space-name)."
            exit 1
          fi

          space_url="https://huggingface:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"

          # HF git rejects blobs >10 MiB. Legacy PDFs are archival only (RAG uses extracted
          # sample_docs/public/*.md). Exclude them from the Space repo to avoid LFS/history issues.
          deploy_dir="$(mktemp -d)"
          git archive HEAD | tar -x -C "${deploy_dir}"
          rm -rf "${deploy_dir}/sample_docs/public/legacy"

          cd "${deploy_dir}"
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"

          git remote add space "${space_url}"

          git push --force space main
          echo "Deployed to https://huggingface.co/spaces/${HF_SPACE}"
